<style>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef,useCallback} = React;

/* ---------------- storage (Firestore-backed) ---------------- */
function waitForFirebase(){
  return new Promise((resolve)=>{
    if(window.dmrFirebase){ resolve(window.dmrFirebase); return; }
    window.addEventListener("firebase-ready", ()=>resolve(window.dmrFirebase), {once:true});
  });
}

async function saveRecordRemote(rec){
  const fb = await waitForFirebase();
  const clean = {...rec};
  await fb.setDoc(fb.doc(fb.db, "records", clean.id), clean);
}
async function deleteRecordRemote(id){
  const fb = await waitForFirebase();
  await fb.deleteDoc(fb.doc(fb.db, "records", id));
}
function subscribeRecords(onData){
  waitForFirebase().then((fb)=>{
    fb.onSnapshot(fb.collection(fb.db, "records"), (snap)=>{
      const recs = snap.docs.map(d=>d.data());
      recs.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      onData(recs);
    }, (err)=>{ console.error("records subscription failed", err); onData([]); });
  });
}

async function nextDmrNo(){
  const fb = await waitForFirebase();
  const counterRef = fb.doc(fb.db, "config", "counter");
  const n = await fb.runTransaction(fb.db, async (tx)=>{
    const snap = await tx.get(counterRef);
    const current = snap.exists() ? (snap.data().seq||0) : 0;
    const next = current + 1;
    tx.set(counterRef, {seq: next});
    return next;
  });
  return "DMR-" + String(n).padStart(4,"0");
}

const DEFAULT_AUTH = { adminPin: "1234", supervisors: [] };
async function saveAuthRemote(auth){
  const fb = await waitForFirebase();
  await fb.setDoc(fb.doc(fb.db, "config", "auth"), auth);
}
function subscribeAuth(onData){
  waitForFirebase().then((fb)=>{
    const authRef = fb.doc(fb.db, "config", "auth");
    fb.onSnapshot(authRef, (snap)=>{
      if(snap.exists()){ onData(snap.data()); }
      else{ fb.setDoc(authRef, DEFAULT_AUTH); onData(DEFAULT_AUTH); }
    }, (err)=>{ console.error("auth subscription failed", err); onData(DEFAULT_AUTH); });
  });
}

/* ---------------- helpers ---------------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function inr(n){
  const v = Number(n)||0;
  return "₹" + v.toLocaleString("en-IN", {maximumFractionDigits:2});
}
function resizeImage(file, maxDim=700, quality=0.75){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error("read failed"));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error("image decode failed"));
      img.onload = ()=>{
        let {width,height} = img;
        if(width>height && width>maxDim){ height=Math.round(height*maxDim/width); width=maxDim; }
        else if(height>=width && height>maxDim){ width=Math.round(width*maxDim/height); height=maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width=width; canvas.height=height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        resolve(dataUrl);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
async function analyzeImage(dataUrl, promptText){
  const base64 = dataUrl.split(",")[1];
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type:"base64", media_type:"image/jpeg", data: base64 } },
          { type: "text", text: promptText }
        ]
      }]
    })
  });
  if(!response.ok){ throw new Error("API error " + response.status); }
  const data = await response.json();
  const text = (data.content || []).filter(b=>b.type==="text").map(b=>b.text).join(" ").trim();
  if(!text) throw new Error("Empty response");
  return text;
}

/* ---------------- PIN pad ---------------- */
function PinPad({length=4, onComplete, resetSignal}){
  const [pin,setPin] = useState("");
  useEffect(()=>{ setPin(""); },[resetSignal]);
  function press(d){
    if(pin.length>=length) return;
    const next = pin+d;
    setPin(next);
    if(next.length===length){
      setTimeout(()=>onComplete(next), 120);
      setTimeout(()=>setPin(""), 350);
    }
  }
  return (
    <div>
      <div className="dots-row">
        {Array.from({length}).map((_,i)=>(
          <div key={i} className={"dot "+(i<pin.length?"filled":"")}></div>
        ))}
      </div>
      <div className="pinpad">
        {[1,2,3,4,5,6,7,8,9].map(n=>(
          <button key={n} type="button" className="pin-btn" onClick={()=>press(String(n))}>{n}</button>
        ))}
        <button type="button" className="pin-btn action" onClick={()=>setPin("")}>Clear</button>
        <button key={0} type="button" className="pin-btn" onClick={()=>press("0")}>0</button>
        <button type="button" className="pin-btn action" onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</button>
      </div>
    </div>
  );
}

/* ---------------- Manage Users (Admin only) ---------------- */
function ManageUsers({auth, updateAuth, showToast}){
  const [curPin,setCurPin] = useState("");
  const [newPin,setNewPin] = useState("");
  const [newSupName,setNewSupName] = useState("");
  const [newSupPin,setNewSupPin] = useState("");

  function changeAdminPin(e){
    e.preventDefault();
    if(curPin!==auth.adminPin){ showToast("Current PIN is incorrect."); return; }
    if(!/^\d{4}$/.test(newPin)){ showToast("New PIN must be exactly 4 digits."); return; }
    const next = {...auth, adminPin:newPin};
    updateAuth(next);
    setCurPin(""); setNewPin("");
    showToast("Admin PIN updated.");
  }
  function addSupervisor(e){
    e.preventDefault();
    if(!newSupName.trim()){ showToast("Enter a name."); return; }
    if(!/^\d{4}$/.test(newSupPin)){ showToast("Supervisor PIN must be exactly 4 digits."); return; }
    const next = {...auth, supervisors:[...auth.supervisors, {id:uid(), name:newSupName.trim(), pin:newSupPin}]};
    updateAuth(next);
    setNewSupName(""); setNewSupPin("");
    showToast("Supervisor added.");
  }
  function removeSupervisor(id){
    const next = {...auth, supervisors:auth.supervisors.filter(s=>s.id!==id)};
    updateAuth(next);
    showToast("Supervisor removed.");
  }

  return (
    <div>
      <h2 className="section-title">Manage Users</h2>
      <p className="section-sub">Control who can log in as Admin or Supervisor, and their PINs.</p>
      <div className="users-grid">
        <div className="panel">
          <h3>Change Admin PIN</h3>
          <form onSubmit={changeAdminPin} style={{display:"flex",flexDirection:"column",gap:12}}>
            <div className="field">
              <label>Current PIN</label>
              <input className="mono-input" type="password" maxLength="4" inputMode="numeric" value={curPin} onChange={e=>setCurPin(e.target.value.replace(/\D/g,""))} />
            </div>
            <div className="field">
              <label>New PIN (4 digits)</label>
              <input className="mono-input" type="password" maxLength="4" inputMode="numeric" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/g,""))} />
            </div>
            <button className="btn btn-primary" type="submit" style={{alignSelf:"flex-start"}}>Update PIN</button>
          </form>
        </div>

        <div className="panel">
          <h3>Supervisors</h3>
          <form onSubmit={addSupervisor} style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <div className="field" style={{flex:1,minWidth:120}}>
              <label>Name</label>
              <input type="text" value={newSupName} onChange={e=>setNewSupName(e.target.value)} placeholder="e.g. Ramesh Patil" />
            </div>
            <div className="field" style={{width:110}}>
              <label>PIN</label>
              <input className="mono-input" type="password" maxLength="4" inputMode="numeric" value={newSupPin} onChange={e=>setNewSupPin(e.target.value.replace(/\D/g,""))} />
            </div>
            <button className="btn btn-steel" type="submit" style={{alignSelf:"flex-end"}}>Add</button>
          </form>
          {auth.supervisors.length===0 && <p className="hint">No supervisors added yet.</p>}
          {auth.supervisors.map(s=>(
            <div className="sup-row" key={s.id}>
              <div><span className="nm">{s.name}</span><span className="pn">PIN {s.pin}</span></div>
              <button className="btn-danger-text" onClick={()=>removeSupervisor(s.id)}>Remove</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------- App ---------------- */
function App(){
  const [auth,setAuth] = useState(DEFAULT_AUTH);
  const [authLoaded,setAuthLoaded] = useState(false);
  const [user,setUser] = useState(null); // {role, name, id?}
  const [tab,setTab] = useState("user");
  const [records,setRecords] = useState([]);
  const [recordsLoaded,setRecordsLoaded] = useState(false);
  const [toast,setToast] = useState(null);
  const [editingId,setEditingId] = useState(null);

  useEffect(()=>{
    subscribeAuth((data)=>{ setAuth(data); setAuthLoaded(true); });
    subscribeRecords((data)=>{ setRecords(data); setRecordsLoaded(true); });
  },[]);

  const showToast = useCallback((msg)=>{
    setToast(msg);
    setTimeout(()=>setToast(null), 2600);
  },[]);

  function upsertRecord(rec){
    const withTimestamp = {...rec, createdAt: rec.createdAt || Date.now()};
    setRecords(prev=>{
      const exists = prev.some(r=>r.id===rec.id);
      if(exists) return prev.map(r=>r.id===rec.id?withTimestamp:r);
      return [withTimestamp, ...prev];
    });
    saveRecordRemote(withTimestamp).catch(()=>showToast("Could not sync to server — check your connection."));
  }
  function deleteRecord(id){
    setRecords(prev=>prev.filter(r=>r.id!==id));
    deleteRecordRemote(id).catch(()=>showToast("Could not sync deletion — check your connection."));
    showToast("Entry deleted");
  }
  function updateAuth(next){
    setAuth(next);
    saveAuthRemote(next).catch(()=>showToast("Could not sync to server — check your connection."));
  }
  function handleLogout(){
    setUser(null);
    setTab("user");
    setEditingId(null);
  }

  const suppliers = useMemo(()=>[...new Set(records.map(r=>r.supplier).filter(Boolean))].sort(),[records]);
  const materials = useMemo(()=>[...new Set(records.map(r=>r.material).filter(Boolean))].sort(),[records]);

  function handleLogin(u){
    setUser(u);
    setTab("user");
    setEditingId(null);
  }

  if(!authLoaded || !recordsLoaded){
    return (
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12,color:"#4B565C",fontFamily:"Inter,sans-serif"}}>
        <div>Connecting to server…</div>
      </div>
    );
  }

  if(!user){
    return <LoginScreen auth={auth} onLogin={handleLogin} />;
  }

  const isAdmin = user.role==="admin";

  return (
    <div>
      <div className="topbar">
        <div className="badge">DMR</div>
        <div className="title-block">
          <div className="t1">Daily Material Report</div>
          <div className="t2">Site Delivery &amp; Payment Tracker</div>
        </div>
        {isAdmin && (
          <div className="tabs">
            <button className={"tab-btn "+(tab==="user"?"active":"")} onClick={()=>setTab("user")}>Entry Form</button>
            <button className={"tab-btn "+(tab==="admin"?"active":"")} onClick={()=>setTab("admin")}>Reports</button>
            <button className={"tab-btn "+(tab==="users"?"active":"")} onClick={()=>setTab("users")}>Manage Users</button>
          </div>
        )}
        <div className="who">
          <div className="who-name"><b>{user.name}</b>{isAdmin?"Admin":"Supervisor"}</div>
          <button className="logout-btn" onClick={handleLogout}>Log out</button>
        </div>
      </div>

      <div className="shell">
        {tab==="user" && (
          <UserPortal
            records={records}
            suppliers={suppliers}
            materials={materials}
            upsertRecord={upsertRecord}
            deleteRecord={deleteRecord}
            showToast={showToast}
            editingId={editingId}
            setEditingId={setEditingId}
            currentUser={user}
            isAdmin={isAdmin}
          />
        )}
        {tab==="admin" && isAdmin && (
          <AdminPortal records={records} suppliers={suppliers} materials={materials} />
        )}
        {tab==="users" && isAdmin && (
          <ManageUsers auth={auth} updateAuth={updateAuth} showToast={showToast} />
        )}
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function blankForm(loggedBy){
  return {
    id: uid(),
    dmrNo: "",
    date: todayISO(),
    supplier: "",
    material: "",
    materialPhoto: "",
    qty: "",
    unit: "Bags",
    vehicleNo: "",
    vehiclePhoto: "",
    invoiceNo: "",
    rate: "",
    finalAmount: "",
    finalAmountTouched: false,
    paid: "unpaid",
    paymentDate: "",
    loggedBy: loggedBy || "",
  };
}

function UserPortal({records, suppliers, materials, upsertRecord, deleteRecord, showToast, editingId, setEditingId, currentUser, isAdmin}){
  const [form,setForm] = useState(()=>blankForm(currentUser.name));
  const [matStatus,setMatStatus] = useState(null);
  const [plateStatus,setPlateStatus] = useState(null);
  const matCameraRef = useRef(null);
  const matGalleryRef = useRef(null);
  const vehCameraRef = useRef(null);
  const vehGalleryRef = useRef(null);

  function startEdit(rec){
    setForm({...rec, finalAmountTouched:true});
    setEditingId(rec.id);
    window.scrollTo({top:0, behavior:"smooth"});
  }
  function resetForm(){
    setForm(blankForm(currentUser.name));
    setEditingId(null);
    setMatStatus(null);
    setPlateStatus(null);
  }

  function setField(key,val){
    setForm(prev=>{
      const next = {...prev,[key]:val};
      if((key==="qty" || key==="rate") && !prev.finalAmountTouched){
        const q = parseFloat(key==="qty"?val:prev.qty)||0;
        const r = parseFloat(key==="rate"?val:prev.rate)||0;
        next.finalAmount = (q*r) ? String(Math.round(q*r*100)/100) : "";
      }
      return next;
    });
  }

  async function handlePhoto(kind, file){
    if(!file) return;
    try{
      const dataUrl = await resizeImage(file);
      setField(kind==="material"?"materialPhoto":"vehiclePhoto", dataUrl);
    }catch(e){
      showToast("Could not read that photo — try another.");
    }
  }

  async function detect(kind){
    const dataUrl = kind==="material" ? form.materialPhoto : form.vehiclePhoto;
    if(!dataUrl){ showToast("Add a photo first."); return; }
    const setStatus = kind==="material" ? setMatStatus : setPlateStatus;
    setStatus({state:"scanning", msg:"Scanning photo…"});
    try{
      const prompt = kind==="material" ? MATERIAL_PROMPT : PLATE_PROMPT;
      const result = await analyzeImage(dataUrl, prompt);
      if(kind==="plate" && result.toUpperCase().includes("UNREADABLE")){
        setStatus({state:"err", msg:"Plate not readable — enter manually."});
      }else{
        setField(kind==="material"?"material":"vehicleNo", result);
        setStatus({state:"ok", msg:"Detected: " + result});
      }
    }catch(e){
      setStatus({state:"err", msg:"Detection failed — enter manually."});
    }
  }

  const [saving,setSaving] = useState(false);
  async function handleSubmit(e){
    e.preventDefault();
    if(!form.supplier.trim() || !form.material.trim() || !form.qty){
      showToast("Supplier, Material and Qty are required.");
      return;
    }
    setSaving(true);
    try{
      const clean = {...form};
      delete clean.finalAmountTouched;
      if(!clean.loggedBy) clean.loggedBy = currentUser.name;
      if(!clean.dmrNo || !clean.dmrNo.trim()){
        clean.dmrNo = await nextDmrNo();
      }
      upsertRecord(clean);
      showToast(editingId ? "Entry updated" : "Entry saved: " + clean.dmrNo);
      resetForm();
    }catch(err){
      showToast("Could not save — check your connection and try again.");
    }finally{
      setSaving(false);
    }
  }

  const visibleRecords = isAdmin ? records : records.filter(r=>r.loggedBy===currentUser.name);
  const recent = visibleRecords.slice(0,25);

  return (
    <div>
      <h2 className="section-title">Log a Delivery</h2>
      <p className="section-sub">Fill in the details as material arrives on site. Photos help auto-fill the material type and vehicle number.</p>

      <form className="clipboard" onSubmit={handleSubmit}>
        <div className="form-grid">
          <div className="field">
            <label>DMR No.</label>
            <input className="mono-input" type="text" placeholder="Auto-assigned on save" value={form.dmrNo} onChange={e=>setField("dmrNo",e.target.value)} />
          </div>
          <div className="field">
            <label>Date of Arrival</label>
            <input type="date" value={form.date} onChange={e=>setField("date",e.target.value)} />
          </div>
          <div className="field">
            <label>Supplier Name</label>
            <input list="supplier-list" type="text" placeholder="e.g. Shree Cement Suppliers" value={form.supplier} onChange={e=>setField("supplier",e.target.value)} />
            <datalist id="supplier-list">{suppliers.map(s=><option key={s} value={s}/>)}</datalist>
          </div>

          <div className="field span2">
            <label>Material (photo auto-detect)</label>
            <div className="photo-slot">
              <div className="photo-row">
                {form.materialPhoto ? (
                  <div className={"scan-wrap"}>
                    <img className="thumb" src={form.materialPhoto} />
                    {matStatus && matStatus.state==="scanning" && <div className="scan-line"></div>}
                  </div>
                ) : <div className="thumb-empty">No photo</div>}
                <div style={{display:"flex",flexDirection:"column",gap:6,flex:1}}>
                  <div className="photo-btn-row">
                    <input ref={matCameraRef} className="hidden-file-input" type="file" accept="image/*" capture="environment" onChange={e=>{handlePhoto("material", e.target.files[0]); e.target.value="";}} />
                    <button type="button" className="photo-btn" onClick={()=>matCameraRef.current.click()}>📷 Take Photo</button>
                    <input ref={matGalleryRef} className="hidden-file-input" type="file" accept="image/*" onChange={e=>{handlePhoto("material", e.target.files[0]); e.target.value="";}} />
                    <button type="button" className="photo-btn" onClick={()=>matGalleryRef.current.click()}>🖼️ Choose from Gallery</button>
                  </div>

            <div className="pay-row">
              <div className="radio-group">
                <div className={"radio-pill "+(form.paid==="paid"?"sel-paid":"")} onClick={()=>setField("paid","paid")}>Paid</div>
                <div className={"radio-pill "+(form.paid==="unpaid"?"sel-unpaid":"")} onClick={()=>setField("paid","unpaid")}>Not Paid</div>
              </div>
              {form.paid==="paid" && (
                <div className="field" style={{minWidth:180}}>
                  <label>Date of Payment</label>
                  <input type="date" value={form.paymentDate} onChange={e=>setField("paymentDate",e.target.value)} />
                </div>
              )}
            </div>
          </div>
        </div>

        <div className="form-actions">
          {editingId && <button type="button" className="btn btn-ghost" onClick={resetForm}>Cancel edit</button>}
          <button type="submit" className="btn btn-primary" disabled={saving}>{saving ? "Saving…" : (editingId ? "Update Entry" : "Save Entry")}</button>
        </div>
      </form>

      <div className="table-card">
        <div className="table-head">
          <h3>{isAdmin ? "Recent Entries" : "My Recent Entries"}</h3>
          <span className="hint">{visibleRecords.length} total</span>
        </div>
        <div style={{overflowX:"auto"}}>
        <table>
          <thead>
            <tr>
              <th>DMR No.</th><th>Date</th><th>Supplier</th><th>Material</th><th>Qty</th>
              <th>Vehicle</th><th>Amount</th><th>Status</th><th>Logged By</th><th></th>
            </tr>
          </thead>
          <tbody>
            {recent.length===0 && <tr className="empty-row"><td colSpan="10">No deliveries logged yet. Use the form above to add the first one.</td></tr>}
            {recent.map(r=>(
              <tr key={r.id}>
                <td className="mono">{r.dmrNo}</td>
                <td>{r.date}</td>
                <td>{r.supplier}</td>
                <td>{r.material}</td>
                <td>{r.qty} {r.unit}</td>
                <td className="mono">{r.vehicleNo||"—"}</td>
                <td className="mono">{inr(r.finalAmount)}</td>
                <td><span className={"status-chip "+(r.paid==="paid"?"status-paid":"status-unpaid")}>{r.paid==="paid"?"Paid":"Unpaid"}</span></td>
                <td>{r.loggedBy||"—"}</td>
                <td>
                  <button className="btn-danger-text" style={{color:"var(--steel)"}} onClick={()=>startEdit(r)}>Edit</button>
                  <button className="btn-danger-text" onClick={()=>deleteRecord(r.id)}>Delete</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Admin Portal ---------------- */
function AdminPortal({records, suppliers, materials}){
  const [fSupplier,setFSupplier] = useState("");
  const [fMaterial,setFMaterial] = useState("");
  const [fFrom,setFFrom] = useState("");
  const [fTo,setFTo] = useState("");
  const [reportTab,setReportTab] = useState("supplier");

  const filtered = useMemo(()=>{
    return records.filter(r=>{
      if(fSupplier && r.supplier!==fSupplier) return false;
      if(fMaterial && r.material!==fMaterial) return false;
      if(fFrom && r.date < fFrom) return false;
      if(fTo && r.date > fTo) return false;
      return true;
    });
  },[records,fSupplier,fMaterial,fFrom,fTo]);

  const totals = useMemo(()=>{
    const totalAmount = filtered.reduce((s,r)=>s+(parseFloat(r.finalAmount)||0),0);
    const paidAmount = filtered.filter(r=>r.paid==="paid").reduce((s,r)=>s+(parseFloat(r.finalAmount)||0),0);
    const unpaidAmount = totalAmount - paidAmount;
    return {count:filtered.length, totalAmount, paidAmount, unpaidAmount};
  },[filtered]);

  function groupBy(keyFn){
    const map = new Map();
    filtered.forEach(r=>{
      const key = keyFn(r) || "—";
      if(!map.has(key)) map.set(key, {key, qtyByUnit:{}, amount:0, count:0});
      const g = map.get(key);
      g.count += 1;
      g.amount += parseFloat(r.finalAmount)||0;
      const u = r.unit||"unit";
      g.qtyByUnit[u] = (g.qtyByUnit[u]||0) + (parseFloat(r.qty)||0);
    });
    return [...map.values()].sort((a,b)=>b.amount-a.amount);
  }

  const bySupplier = useMemo(()=>groupBy(r=>r.supplier),[filtered]);
  const byMaterial = useMemo(()=>groupBy(r=>r.material),[filtered]);
  const byDate = useMemo(()=>groupBy(r=>r.date),[filtered]);

  const maxAmount = useMemo(()=>{
    const arr = [...bySupplier, ...byMaterial, ...byDate].map(g=>g.amount);
    return Math.max(1, ...arr);
  },[bySupplier,byMaterial,byDate]);

  function fmtQty(qtyByUnit){
    return Object.entries(qtyByUnit).map(([u,q])=>`${Math.round(q*100)/100} ${u}`).join(", ");
  }

  function exportCSV(){
    const header = ["DMR No","Date","Supplier","Material","Qty","Unit","Vehicle No","Invoice No","Rate","Final Amount","Paid","Payment Date","Logged By"];
    const rows = filtered.map(r=>[r.dmrNo,r.date,r.supplier,r.material,r.qty,r.unit,r.vehicleNo,r.invoiceNo,r.rate,r.finalAmount,r.paid,r.paymentDate,r.loggedBy]);
    const csv = [header, ...rows].map(row=>row.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "dmr_report_" + todayISO() + ".csv";
    a.click();
    URL.revokeObjectURL(url);
  }

  const groupData = reportTab==="supplier" ? bySupplier : reportTab==="material" ? byMaterial : byDate;
  const groupLabel = reportTab==="supplier" ? "Supplier" : reportTab==="material" ? "Material" : "Date";

  return (
    <div>
      <h2 className="section-title">Reports &amp; Filters</h2>
      <p className="section-sub">Filter deliveries and review supplier, material, and date-wise breakdowns.</p>

      <div className="filter-bar">
        <div className="field">
          <label>Supplier</label>
          <select value={fSupplier} onChange={e=>setFSupplier(e.target.value)}>
            <option value="">All suppliers</option>
            {suppliers.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Material</label>
          <select value={fMaterial} onChange={e=>setFMaterial(e.target.value)}>
            <option value="">All materials</option>
            {materials.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div className="field">
          <label>From</label>
          <input type="date" value={fFrom} onChange={e=>setFFrom(e.target.value)} />
        </div>
        <div className="field">
          <label>To</label>
          <input type="date" value={fTo} onChange={e=>setFTo(e.target.value)} />
        </div>
        <button className="btn btn-ghost" onClick={()=>{setFSupplier("");setFMaterial("");setFFrom("");setFTo("");}}>Clear filters</button>
        <button className="btn btn-primary" style={{marginLeft:"auto"}} onClick={exportCSV}>Export CSV</button>
      </div>

      <div className="stat-row">
        <div className="stat-card">
          <div className="stat-label">Deliveries</div>
          <div className="stat-value">{totals.count}</div>
        </div>
        <div className="stat-card orange">
          <div className="stat-label">Total Billed</div>
          <div className="stat-value mono">{inr(totals.totalAmount)}</div>
        </div>
        <div className="stat-card pine">
          <div className="stat-label">Paid</div>
          <div className="stat-value mono">{inr(totals.paidAmount)}</div>
        </div>
        <div className="stat-card amber">
          <div className="stat-label">Outstanding</div>
          <div className="stat-value mono">{inr(totals.unpaidAmount)}</div>
        </div>
      </div>

      <div className="report-tabs">
        <button className={"rtab "+(reportTab==="supplier"?"active":"")} onClick={()=>setReportTab("supplier")}>Supplier-wise</button>
        <button className={"rtab "+(reportTab==="material"?"active":"")} onClick={()=>setReportTab("material")}>Material-wise</button>
        <button className={"rtab "+(reportTab==="date"?"active":"")} onClick={()=>setReportTab("date")}>Date-wise</button>
      </div>

      <div className="table-card">
        <div className="table-head">
          <h3>{groupLabel}-wise Breakdown</h3>
          <span className="hint">{groupData.length} groups</span>
        </div>
        <div style={{overflowX:"auto"}}>
        <table>
          <thead>
            <tr><th>{groupLabel}</th><th>Deliveries</th><th>Qty</th><th>Amount</th></tr>
          </thead>
          <tbody>
            {groupData.length===0 && <tr className="empty-row"><td colSpan="4">No records match the current filters.</td></tr>}
            {groupData.map(g=>(
              <tr key={g.key}>
                <td className="group-name">{g.key}</td>
                <td>{g.count}</td>
                <td>{fmtQty(g.qtyByUnit)}</td>
                <td className="mono">
                  {inr(g.amount)}
                  <span className="bar-track"><span className="bar-fill" style={{width:(g.amount/maxAmount*100)+"%"}}></span></span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
